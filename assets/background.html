<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>梦幻珊瑚红光影背景</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            /* 背景偏白：使用温暖的米白色作为基底 */
            background-color: #fefcfb;
        }

        #canvas {
            display: block;
            width: 100%;
            height: 100%;
            /* 添加轻微的模糊滤镜，增强梦幻感 */
            filter: blur(4px);
        }

        /* 覆盖层：可以放置你的内容 */
        .overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ff7f50;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-weight: 300;
            letter-spacing: 0.5rem;
            text-transform: uppercase;
            pointer-events: none;
            z-index: 10;
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <div class="overlay">Coral Shadow</div>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height, particles;

        // 珊瑚色系配置
        const colorPalette = [
            { r: 255, g: 127, b: 80 },  // 核心珊瑚红
            { r: 255, g: 160, b: 122 }, // 浅鲑鱼色
            { r: 255, g: 218, b: 185 }, // 桃色
            { r: 255, g: 240, b: 245 }  // 极浅粉（接近白）
        ];

        function init() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;

            particles = [];
            // 控制数量：数量较少且体积较大，更显简约
            const count = Math.floor((width * height) / 40000); 
            
            for (let i = 0; i < count; i++) {
                particles.push(new LightFlake());
            }
        }

        class LightFlake {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                // 光片半径较大，制造云雾感
                this.radius = Math.random() * 200 + 100;
                // 极慢的移动速度
                this.vx = (Math.random() - 0.5) * 0.4;
                this.vy = (Math.random() - 0.5) * 0.4;
                // 颜色选择
                this.color = colorPalette[Math.floor(Math.random() * colorPalette.length)];
                // 初始透明度：非常低，确保“背景偏白”
                this.alpha = Math.random() * 0.15 + 0.05;
                // 呼吸动画变量
                this.alphaStep = Math.random() * 0.002 + 0.001;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;

                // 边界检测：超出后从另一侧慢慢回来或反弹
                if (this.x < -this.radius) this.x = width + this.radius;
                if (this.x > width + this.radius) this.x = -this.radius;
                if (this.y < -this.radius) this.y = height + this.radius;
                if (this.y > height + this.radius) this.y = -this.radius;

                // 呼吸效果逻辑
                this.alpha += this.alphaStep;
                if (this.alpha > 0.3 || this.alpha < 0.05) {
                    this.alphaStep *= -1;
                }
            }

            draw() {
                // 核心：使用径向渐变
                const gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, this.radius
                );

                const { r, g, b } = this.color;
                // 中心有色，边缘完全透明
                gradient.addColorStop(0, `rgba(${r}, ${g}, ${b}, ${this.alpha})`);
                gradient.addColorStop(0.6, `rgba(${r}, ${g}, ${b}, ${this.alpha * 0.4})`);
                gradient.addColorStop(1, `rgba(${r}, ${g}, ${b}, 0)`);

                ctx.beginPath();
                ctx.fillStyle = gradient;
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function animate() {
            // 每一帧清空画布，但保留一点底色
            ctx.clearRect(0, 0, width, height);
            
            // 混合模式：使用 'screen' 让光片叠加时变亮而不变脏
            ctx.globalCompositeOperation = 'screen';

            particles.forEach(p => {
                p.update();
                p.draw();
            });

            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', init);

        // 启动
        init();
        animate();
    </script>
</body>
</html>
