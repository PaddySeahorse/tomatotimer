<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>动态光影背景</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #fefcfb;
            transition: background-color 0.3s ease;
        }

        #canvas {
            display: block;
            width: 100%;
            height: 100%;
            filter: blur(4px);
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height, particles;
        let currentTheme = 'light';

        // 色系配置
        const colorPalettes = {
            light: [
                { r: 255, g: 127, b: 80 },  // 珊瑚红
                { r: 255, g: 160, b: 122 }, // 浅鲑鱼色
                { r: 255, g: 218, b: 185 }, // 桃色
                { r: 255, g: 240, b: 245 }  // 极浅粉
            ],
            dark: [
                { r: 255, g: 250, b: 205 }, // 淡黄色 (LemonChiffon)
                { r: 255, g: 255, b: 224 }, // 浅黄色 (LightYellow)
                { r: 255, g: 248, b: 220 }, // 玉米丝色 (Cornsilk)
                { r: 50, g: 50, b: 55 }     // 暗灰色
            ]
        };

        const backgroundColors = {
            light: '#fefcfb',  // 温暖米白色
            dark: '#1f2937'    // 深灰色
        };

        function getColorPalette() {
            return colorPalettes[currentTheme];
        }

        function getBackgroundColor() {
            return backgroundColors[currentTheme];
        }

        function updateTheme(theme) {
            if (theme === currentTheme) return;
            currentTheme = theme;
            document.body.style.backgroundColor = getBackgroundColor();

            // 更新所有粒子的颜色
            const newPalette = getColorPalette();
            particles.forEach(p => {
                p.color = newPalette[Math.floor(Math.random() * newPalette.length)];
            });
        }

        function init() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            document.body.style.backgroundColor = getBackgroundColor();

            particles = [];
            const count = Math.floor((width * height) / 40000);
            const palette = getColorPalette();

            for (let i = 0; i < count; i++) {
                particles.push(new LightFlake(palette));
            }
        }

        class LightFlake {
            constructor(palette) {
                this.reset(palette);
            }

            reset(palette) {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.radius = Math.random() * 200 + 100;
                this.vx = (Math.random() - 0.5) * 0.4;
                this.vy = (Math.random() - 0.5) * 0.4;
                this.color = palette[Math.floor(Math.random() * palette.length)];
                this.alpha = Math.random() * 0.15 + 0.05;
                this.alphaStep = Math.random() * 0.002 + 0.001;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;

                if (this.x < -this.radius) this.x = width + this.radius;
                if (this.x > width + this.radius) this.x = -this.radius;
                if (this.y < -this.radius) this.y = height + this.radius;
                if (this.y > height + this.radius) this.y = -this.radius;

                this.alpha += this.alphaStep;
                if (this.alpha > 0.3 || this.alpha < 0.05) {
                    this.alphaStep *= -1;
                }
            }

            draw() {
                const gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, this.radius
                );

                const { r, g, b } = this.color;
                gradient.addColorStop(0, `rgba(${r}, ${g}, ${b}, ${this.alpha})`);
                gradient.addColorStop(0.6, `rgba(${r}, ${g}, ${b}, ${this.alpha * 0.4})`);
                gradient.addColorStop(1, `rgba(${r}, ${g}, ${b}, 0)`);

                ctx.beginPath();
                ctx.fillStyle = gradient;
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);
            ctx.globalCompositeOperation = 'screen';

            particles.forEach(p => {
                p.update();
                p.draw();
            });

            requestAnimationFrame(animate);
        }

        // 监听父页面的主题变化
        window.addEventListener('message', (event) => {
            if (event.data && event.data.type === 'theme-change') {
                updateTheme(event.data.theme);
            }
        });

        window.addEventListener('resize', init);

        // 启动
        init();
        animate();
    </script>
</body>
</html>
