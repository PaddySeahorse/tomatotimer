<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>动态光影背景</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #fefcfb;
            transition: background-color 0.3s ease;
        }

        #canvas {
            display: block;
            width: 100%;
            height: 100%;
            filter: blur(4px);
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height, particles;
        let currentTheme = 'light';
        let currentTimerState = 'focus';

        // 色系配置
        const colorPalettes = {
            light: {
                focus: [
                    { r: 255, g: 107, b: 107 }, // FF6B6B
                    { r: 255, g: 140, b: 140 }, // 浅红色
                    { r: 255, g: 180, b: 180 }, // 更浅的红色
                    { r: 255, g: 240, b: 245 }  // 极浅粉
                ],
                shortBreak: [
                    { r: 78, g: 205, b: 196 }, // 4ECDC4
                    { r: 120, g: 220, b: 210 }, // 浅青色
                    { r: 160, g: 240, b: 230 }, // 更浅的青色
                    { r: 240, g: 255, b: 250 }  // 极浅青
                ],
                longBreak: [
                    { r: 108, g: 92, b: 231 }, // 6C5CE7
                    { r: 140, g: 120, b: 240 }, // 浅紫色
                    { r: 180, g: 160, b: 250 }, // 更浅的紫色
                    { r: 245, g: 240, b: 255 }  // 极浅紫
                ]
            },
            dark: {
                focus: [
                    { r: 255, g: 107, b: 107 }, // FF6B6B
                    { r: 200, g: 80, b: 80 },   // 深红色
                    { r: 150, g: 60, b: 60 },   // 更深的红色
                    { r: 50, g: 50, b: 55 }     // 暗灰色
                ],
                shortBreak: [
                    { r: 78, g: 205, b: 196 }, // 4ECDC4
                    { r: 60, g: 160, b: 150 },   // 深青色
                    { r: 40, g: 120, b: 110 },   // 更深的青色
                    { r: 50, g: 50, b: 55 }      // 暗灰色
                ],
                longBreak: [
                    { r: 108, g: 92, b: 231 }, // 6C5CE7
                    { r: 80, g: 70, b: 180 },    // 深紫色
                    { r: 60, g: 50, b: 140 },    // 更深的紫色
                    { r: 50, g: 50, b: 55 }      // 暗灰色
                ]
            }
        };

        const backgroundColors = {
            light: {
                focus: '#fefcfb',      // 温暖米白色
                shortBreak: '#f0fdfa', // 浅青色背景
                longBreak: '#f5f3ff'   // 浅紫色背景
            },
            dark: {
                focus: '#1f2937',      // 深灰色
                shortBreak: '#111827', // 更深的背景
                longBreak: '#1e1b4b'   // 深紫背景
            }
        };

        function getColorPalette() {
            return colorPalettes[currentTheme][currentTimerState];
        }

        function getBackgroundColor() {
            return backgroundColors[currentTheme][currentTimerState];
        }

        function updateStyle(theme, timerState) {
            let changed = false;
            if (theme && theme !== currentTheme) {
                currentTheme = theme;
                changed = true;
            }
            if (timerState && timerState !== currentTimerState) {
                currentTimerState = timerState;
                changed = true;
            }

            if (!changed) return;

            document.body.style.backgroundColor = getBackgroundColor();

            // 更新所有粒子的颜色
            const newPalette = getColorPalette();
            particles.forEach(p => {
                p.color = newPalette[Math.floor(Math.random() * newPalette.length)];
            });
        }

        function init() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            document.body.style.backgroundColor = getBackgroundColor();

            particles = [];
            const count = Math.floor((width * height) / 40000);
            const palette = getColorPalette();

            for (let i = 0; i < count; i++) {
                particles.push(new LightFlake(palette));
            }
        }

        class LightFlake {
            constructor(palette) {
                this.reset(palette);
            }

            reset(palette) {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.radius = Math.random() * 200 + 100;
                this.vx = (Math.random() - 0.5) * 0.4;
                this.vy = (Math.random() - 0.5) * 0.4;
                this.color = palette[Math.floor(Math.random() * palette.length)];
                this.alpha = Math.random() * 0.15 + 0.05;
                this.alphaStep = Math.random() * 0.002 + 0.001;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;

                if (this.x < -this.radius) this.x = width + this.radius;
                if (this.x > width + this.radius) this.x = -this.radius;
                if (this.y < -this.radius) this.y = height + this.radius;
                if (this.y > height + this.radius) this.y = -this.radius;

                this.alpha += this.alphaStep;
                if (this.alpha > 0.3 || this.alpha < 0.05) {
                    this.alphaStep *= -1;
                }
            }

            draw() {
                const gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, this.radius
                );

                const { r, g, b } = this.color;
                gradient.addColorStop(0, `rgba(${r}, ${g}, ${b}, ${this.alpha})`);
                gradient.addColorStop(0.6, `rgba(${r}, ${g}, ${b}, ${this.alpha * 0.4})`);
                gradient.addColorStop(1, `rgba(${r}, ${g}, ${b}, 0)`);

                ctx.beginPath();
                ctx.fillStyle = gradient;
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);
            ctx.globalCompositeOperation = 'screen';

            particles.forEach(p => {
                p.update();
                p.draw();
            });

            requestAnimationFrame(animate);
        }

        // 监听父页面的主题变化
        window.addEventListener('message', (event) => {
            if (event.data && event.data.type === 'theme-change') {
                updateStyle(event.data.theme, event.data.timerState);
            }
        });

        window.addEventListener('resize', init);

        // 启动
        init();
        animate();
    </script>
</body>
</html>
